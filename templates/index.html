<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Parataxis Volume Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:       #0a0c0f;
      --surface:  #111418;
      --border:   #1e2328;
      --text:     #e8eaed;
      --muted:    #6b7280;
      --c1:       #e8eaed;  /* parataxis korea — white */
      --c2:       #4ade80;  /* parataxis eth  — green */
      --c3:       #60a5fa;  /* bitmax         — blue */
      --c4:       #f59e0b;  /* bitplanet      — amber */
    }
    html, body { height: 100%; background: var(--bg); color: var(--text);
      font-family: 'Syne', sans-serif; font-size: 14px; }

    .wrapper { max-width: 1140px; margin: 0 auto; padding: 48px 24px 72px; }

    /* Header */
    .header { display:flex; align-items:flex-end; justify-content:space-between;
      flex-wrap:wrap; gap:16px; margin-bottom:36px; }
    .brand-tag { font-family:'DM Mono',monospace; font-size:11px; letter-spacing:4px;
      text-transform:uppercase; color:var(--muted); margin-bottom:8px; }
    .header h1 { font-size:26px; font-weight:800; letter-spacing:-0.5px; }
    .updated { font-family:'DM Mono',monospace; font-size:11px; color:var(--muted); text-align:right; }
    .updated span { display:block; color:var(--text); font-size:12px; margin-top:2px; }

    /* Toolbar */
    .toolbar { display:flex; align-items:center; justify-content:space-between;
      flex-wrap:wrap; gap:12px; margin-bottom:20px; }
    .pills { display:flex; gap:6px; flex-wrap:wrap; }
    .pills button {
      background:#1a1d22; color:var(--muted); border:1px solid var(--border);
      border-radius:6px; padding:6px 14px; font-family:'DM Mono',monospace;
      font-size:12px; cursor:pointer; transition:all .15s; }
    .pills button:hover { color:var(--text); border-color:#3a3f47; }
    .pills button.active { background:var(--text); color:#0a0c0f;
      border-color:var(--text); font-weight:500; }
    .currency-toggle { display:flex; gap:6px; }
    .currency-toggle button {
      background:#1a1d22; color:var(--muted); border:1px solid var(--border);
      border-radius:6px; padding:6px 12px; font-family:'DM Mono',monospace;
      font-size:11px; cursor:pointer; transition:all .15s; letter-spacing:.5px; }
    .currency-toggle button.active { background:#1e2328; color:var(--text); border-color:#4a4f57; }

    /* Legend */
    .legend { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:20px; }
    .leg { display:flex; align-items:center; gap:7px; cursor:pointer; padding:5px 11px;
      border-radius:6px; border:1px solid var(--border); background:#1a1d22;
      transition:all .15s; user-select:none; font-size:12px; font-weight:600; }
    .leg:hover { border-color:#3a3f47; }
    .leg.dim { opacity:.3; }
    .leg-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
    .leg-src { font-family:'DM Mono',monospace; font-size:10px; color:var(--muted); }
    .halted-badge { font-family:'DM Mono',monospace; font-size:9px; color:#ef4444;
      border:1px solid #ef444433; border-radius:3px; padding:1px 4px; }

    /* Cards */
    .card { background:var(--surface); border:1px solid var(--border);
      border-radius:12px; padding:24px; margin-bottom:20px; position:relative; }
    .card-title { font-size:12px; font-weight:700; text-transform:uppercase;
      letter-spacing:.8px; color:var(--muted); margin-bottom:16px; }
    .chart-wrap { position:relative; }
    .chart-wrap.tall { height:360px; }
    .chart-wrap.short { height:280px; }

    .loading { position:absolute; inset:0; display:flex; align-items:center;
      justify-content:center; background:var(--surface); border-radius:8px;
      z-index:10; opacity:0; pointer-events:none; transition:opacity .2s; }
    .loading.on { opacity:1; pointer-events:all; }
    .spinner { width:22px; height:22px; border:2px solid var(--border);
      border-top-color:var(--c2); border-radius:50%; animation:spin .7s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* Stats */
    .stats-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:20px; }
    @media(max-width:700px){ .stats-grid{ grid-template-columns:repeat(2,1fr); } }
    .stat-card { background:var(--surface); border:1px solid var(--border);
      border-radius:10px; padding:18px; }
    .stat-head { display:flex; align-items:center; gap:7px; margin-bottom:14px; }
    .stat-dot { width:8px; height:8px; border-radius:50%; }
    .stat-name { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.3px; }
    .stat-row { display:flex; justify-content:space-between; align-items:baseline;
      padding:5px 0; border-bottom:1px solid var(--border); }
    .stat-row:last-child { border-bottom:none; }
    .stat-lbl { font-family:'DM Mono',monospace; font-size:10px; color:var(--muted);
      text-transform:uppercase; letter-spacing:.4px; }
    .stat-val { font-family:'DM Mono',monospace; font-size:12px; }
    .err { font-family:'DM Mono',monospace; font-size:11px; color:#ef4444; text-align:center; padding:8px; }

    /* Pie + line row */
    .two-col { display:grid; grid-template-columns:1fr 2fr; gap:16px; margin-bottom:20px; }
    @media(max-width:700px){ .two-col{ grid-template-columns:1fr; } }

    /* FX badge */
    .fx-badge { font-family:'DM Mono',monospace; font-size:10px; color:var(--muted);
      margin-top:6px; text-align:right; }
  </style>
</head>
<body>
<div class="wrapper">

  <!-- Header -->
  <div class="header">
    <div>
      <div class="brand-tag">PARATAXIS KOREA</div>
      <h1>Volume Tracker</h1>
    </div>
    <div class="updated">LAST UPDATED<span id="ts">—</span></div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="pills" id="ranges">
      <button data-p="1m" class="active">1M</button>
      <button data-p="3m">3M</button>
      <button data-p="6m">6M</button>
      <button data-p="12m">12M</button>
      <button data-p="24m">24M</button>
    </div>
    <div class="currency-toggle">
      <button data-c="usd" class="active">USD</button>
      <button data-c="krw">KRW</button>
    </div>
  </div>

  <!-- Legend -->
  <div class="legend" id="legend"></div>

  <!-- Volume chart -->
  <div class="card">
    <div class="card-title">Trading Volume Turnover</div>
    <div class="loading" id="load1"><div class="spinner"></div></div>
    <div class="chart-wrap tall"><canvas id="volChart"></canvas></div>
    <div class="fx-badge" id="fx-badge"></div>
  </div>

  <!-- Stats -->
  <div class="stats-grid" id="stats"></div>

  <!-- Market share row -->
  <div class="two-col">
    <div class="card">
      <div class="card-title">Volume Market Share</div>
      <div class="chart-wrap short"><canvas id="pieChart"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title">Market Share Over Time</div>
      <div class="loading" id="load2"><div class="spinner"></div></div>
      <div class="chart-wrap short"><canvas id="shareChart"></canvas></div>
    </div>
  </div>

</div>

<script>
const STOCKS = {
  parataxis_korea: { label:"Parataxis Korea",    color:"#e8eaed" },
  parataxis_eth:   { label:"Parataxis Ethereum", color:"#4ade80" },
  bitmax:          { label:"Bitmax",             color:"#60a5fa" },
  bitplanet:       { label:"Bitplanet",          color:"#f59e0b" },
};
const KEYS   = Object.keys(STOCKS);
const hidden = new Set();
let period   = "1m";
let currency = "usd";
let last     = null;

// ── Chart init ────────────────────────────────────────────────────────────────
function makeChart(id, type, opts = {}) {
  return new Chart(document.getElementById(id).getContext("2d"), {
    type,
    data:    { labels: [], datasets: [] },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: {
        backgroundColor:"#1a1d22", borderColor:"#2a2d32", borderWidth:1,
        titleFont:{ family:"'DM Mono',monospace", size:11 },
        bodyFont: { family:"'DM Mono',monospace", size:11 },
      }},
      scales: type === "pie" ? {} : {
        x: { grid:{color:"#1a1d22"}, ticks:{color:"#6b7280", font:{family:"'DM Mono',monospace",size:10}, maxTicksLimit:10}, border:{color:"#1e2328"} },
        y: { grid:{color:"#1a1d22"}, ticks:{color:"#6b7280", font:{family:"'DM Mono',monospace",size:10}, callback: v => fmtAxis(v)}, border:{color:"#1e2328"} },
      },
      ...opts
    }
  });
}

const volChart   = makeChart("volChart",   "bar", {
  interaction:{ mode:"index", intersect:false },
  plugins:{ tooltip:{ callbacks:{ label: c => ` ${c.dataset.label}: ${fmtFull(c.parsed.y)}` } } }
});
const pieChart   = makeChart("pieChart",   "pie", {
  plugins:{ tooltip:{ callbacks:{ label: c => ` ${c.label}: ${c.parsed.toFixed(1)}%` } } }
});
const shareChart = makeChart("shareChart", "line", {
  interaction:{ mode:"index", intersect:false },
  plugins:{ tooltip:{ callbacks:{ label: c => ` ${c.dataset.label}: ${c.parsed.y.toFixed(1)}%` } } },
  scales:{
    x:{ grid:{color:"#1a1d22"}, ticks:{color:"#6b7280",font:{family:"'DM Mono',monospace",size:10},maxTicksLimit:10}, border:{color:"#1e2328"} },
    y:{ grid:{color:"#1a1d22"}, ticks:{color:"#6b7280",font:{family:"'DM Mono',monospace",size:10},callback:v=>v+"%"}, border:{color:"#1e2328"}, min:0, max:100 },
  }
});

// ── Format helpers ────────────────────────────────────────────────────────────
function fmtAxis(v) {
  if (v == null) return "—";
  const sym = currency === "usd" ? "$" : "₩";
  if (v >= 1e9)  return sym + (v/1e9).toFixed(1)  + "B";
  if (v >= 1e6)  return sym + (v/1e6).toFixed(1)  + "M";
  if (v >= 1e3)  return sym + (v/1e3).toFixed(0)  + "K";
  return sym + v;
}
function fmtFull(v) {
  if (v == null) return "—";
  const sym = currency === "usd" ? "$" : "₩";
  return sym + v.toLocaleString(undefined, {maximumFractionDigits: currency==="usd"?0:0});
}

// ── Legend ────────────────────────────────────────────────────────────────────
function buildLegend(data) {
  const el = document.getElementById("legend");
  el.innerHTML = "";
  KEYS.forEach(k => {
    const s   = STOCKS[k];
    const src = data?.[k]?.source || "";
    const hal = data?.[k]?.halted;
    const d   = document.createElement("div");
    d.className = "leg" + (hidden.has(k) ? " dim" : "");
    d.innerHTML = `<div class="leg-dot" style="background:${s.color}"></div>
      ${s.label}
      ${src && src !== "error" ? `<span class="leg-src">[${src}]</span>` : ""}
      ${hal ? `<span class="halted-badge">HALTED</span>` : ""}`;
    d.onclick = () => { hidden.has(k)?hidden.delete(k):hidden.add(k); if(last)render(last); buildLegend(data); };
    el.appendChild(d);
  });
}

// ── Render charts ─────────────────────────────────────────────────────────────
function render(json) {
  last = json;
  const data = json.data;

  // Shared dates
  const allDates = [...new Set(KEYS.flatMap(k => data[k]?.dates||[]))].sort();

  // Volume bar chart
  volChart.data.labels   = allDates;
  volChart.data.datasets = KEYS.map(k => {
    const s = STOCKS[k];
    const v = data[k] || {};
    const map = {};
    (v.dates||[]).forEach((d,i)=>map[d]=v.turnover[i]);
    return {
      label:           s.label,
      data:            allDates.map(d=>map[d]??null),
      backgroundColor: hidden.has(k) ? "transparent" : s.color+"99",
      borderColor:     hidden.has(k) ? "transparent" : s.color,
      borderWidth: 1, borderRadius: 2,
    };
  });
  volChart.update("none");

  // Pie chart
  const pie = json.pie;
  pieChart.data.labels   = KEYS.map(k=>STOCKS[k].label);
  pieChart.data.datasets = [{
    data:            KEYS.map(k=>pie[k]?.pct||0),
    backgroundColor: KEYS.map(k=>STOCKS[k].color+"cc"),
    borderColor:     KEYS.map(k=>STOCKS[k].color),
    borderWidth: 1,
  }];
  pieChart.update("none");

  // Market share line chart
  const ms = json.market_share;
  shareChart.data.labels   = allDates;
  shareChart.data.datasets = KEYS.map(k => {
    const s   = STOCKS[k];
    const msv = ms[k] || {};
    const map = {};
    (msv.dates||[]).forEach((d,i)=>map[d]=msv.shares[i]);
    return {
      label:       s.label,
      data:        allDates.map(d=>map[d]??null),
      borderColor: hidden.has(k) ? "transparent" : s.color,
      backgroundColor: "transparent",
      borderWidth: 2, pointRadius: 0, tension: 0.3,
      hidden: hidden.has(k),
    };
  });
  shareChart.update("none");

  // Stats
  const sym = currency === "usd" ? "$" : "₩";
  const statsEl = document.getElementById("stats");
  statsEl.innerHTML = "";
  KEYS.forEach(k => {
    const s    = STOCKS[k];
    const v    = data[k] || {};
    const t    = v.turnover || [];
    const latest = t.length ? t[t.length-1] : null;
    const high   = t.length ? Math.max(...t) : null;
    const low    = t.length ? Math.min(...t.filter(x=>x>0)) : null;
    const avg30  = v.avg_30d;
    const card = document.createElement("div");
    card.className = "stat-card";
    card.innerHTML = `
      <div class="stat-head">
        <div class="stat-dot" style="background:${s.color}"></div>
        <span class="stat-name">${s.label}</span>
        ${v.halted ? `<span class="halted-badge">HALTED</span>` : ""}
      </div>
      ${v.error ? `<div class="err">No data</div>` : `
      <div class="stat-row"><span class="stat-lbl">Latest</span><span class="stat-val">${latest!=null?sym+latest.toLocaleString(undefined,{maximumFractionDigits:0}):"—"}</span></div>
      <div class="stat-row"><span class="stat-lbl">30D Avg</span><span class="stat-val">${avg30!=null?sym+avg30.toLocaleString(undefined,{maximumFractionDigits:0}):"—"}</span></div>
      <div class="stat-row"><span class="stat-lbl">Highest</span><span class="stat-val">${high!=null?sym+high.toLocaleString(undefined,{maximumFractionDigits:0}):"—"}</span></div>
      <div class="stat-row"><span class="stat-lbl">Lowest</span><span class="stat-val">${low!=null?sym+low.toLocaleString(undefined,{maximumFractionDigits:0}):"—"}</span></div>
      `}
    `;
    statsEl.appendChild(card);
  });

  document.getElementById("ts").textContent       = json.updated_at;
  document.getElementById("fx-badge").textContent = `FX: 1 USD = ${json.fx_rate.toLocaleString(undefined,{maximumFractionDigits:0})} KRW`;

  buildLegend(data);
}

// ── Fetch ─────────────────────────────────────────────────────────────────────
async function fetchData() {
  document.getElementById("load1").classList.add("on");
  document.getElementById("load2").classList.add("on");
  try {
    const r    = await fetch(`/api/volume?period=${period}&currency=${currency}`);
    const json = await r.json();
    render(json);
  } catch(e) { console.error(e); }
  finally {
    document.getElementById("load1").classList.remove("on");
    document.getElementById("load2").classList.remove("on");
  }
}

// ── Controls ──────────────────────────────────────────────────────────────────
document.getElementById("ranges").addEventListener("click", e => {
  const btn = e.target.closest("button");
  if (!btn) return;
  document.querySelectorAll("#ranges button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  period = btn.dataset.p;
  fetchData();
});

document.querySelector(".currency-toggle").addEventListener("click", e => {
  const btn = e.target.closest("button");
  if (!btn) return;
  document.querySelectorAll(".currency-toggle button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  currency = btn.dataset.c;
  fetchData();
});

// ── Init ──────────────────────────────────────────────────────────────────────
fetchData();
setInterval(fetchData, 30000);
</script>
</body>
</html>
