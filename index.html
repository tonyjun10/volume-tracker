<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Parataxis Volume Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0c0f;
      --surface:   #111418;
      --border:    #1e2328;
      --text:      #e8eaed;
      --muted:     #6b7280;
      --accent1:   #4ade80;   /* parataxis eth — green */
      --accent2:   #60a5fa;   /* bitmax — blue */
      --accent3:   #f59e0b;   /* bitplanet — amber */
      --pill-bg:   #1a1d22;
      --pill-active: #e8eaed;
      --pill-text-active: #0a0c0f;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      line-height: 1.5;
    }

    /* ── Layout ── */
    .wrapper {
      max-width: 1100px;
      margin: 0 auto;
      padding: 48px 24px 64px;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 40px;
    }

    .header-left h1 {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.5px;
      line-height: 1.1;
    }

    .header-left h1 span {
      color: var(--accent1);
    }

    .header-left p {
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      margin-top: 6px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .updated {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      text-align: right;
    }

    .updated span {
      display: block;
      color: var(--text);
      font-size: 12px;
      margin-top: 2px;
    }

    /* ── Controls ── */
    .controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 24px;
    }

    .range-pills {
      display: flex;
      gap: 6px;
    }

    .range-pills button {
      background: var(--pill-bg);
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 14px;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s ease;
      letter-spacing: 0.3px;
    }

    .range-pills button:hover {
      color: var(--text);
      border-color: #3a3f47;
    }

    .range-pills button.active {
      background: var(--pill-active);
      color: var(--pill-text-active);
      border-color: var(--pill-active);
      font-weight: 500;
    }

    /* ── Legend toggles ── */
    .legend {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      padding: 6px 12px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--pill-bg);
      transition: all 0.15s ease;
      user-select: none;
    }

    .legend-item:hover { border-color: #3a3f47; }

    .legend-item.dimmed {
      opacity: 0.35;
    }

    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .legend-label {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.2px;
    }

    .legend-source {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      margin-left: 2px;
    }

    /* ── Chart card ── */
    .chart-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px;
      position: relative;
      margin-bottom: 24px;
    }

    .chart-wrap {
      position: relative;
      height: 380px;
    }

    .loading-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--surface);
      border-radius: 8px;
      z-index: 10;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .loading-overlay.visible {
      opacity: 1;
      pointer-events: all;
    }

    .spinner {
      width: 24px;
      height: 24px;
      border: 2px solid var(--border);
      border-top-color: var(--accent1);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Stats row ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    @media (max-width: 640px) {
      .stats-grid { grid-template-columns: 1fr; }
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
    }

    .stat-card-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }

    .stat-card-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .stat-card-name {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.3px;
      text-transform: uppercase;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 5px 0;
      border-bottom: 1px solid var(--border);
    }

    .stat-row:last-child { border-bottom: none; }

    .stat-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .stat-value {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      font-weight: 500;
    }

    .error-msg {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: #ef4444;
      text-align: center;
      padding: 8px;
    }
  </style>
</head>
<body>
<div class="wrapper">

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div style="display:flex;align-items:center;gap:14px;margin-bottom:8px;">
        <img src="/static/logo.jpg" alt="Parataxis" style="width:42px;height:42px;border-radius:8px;object-fit:cover;flex-shrink:0;">
        <h1>Parataxis <span>Volume</span> Tracker</h1>
      </div>
      <p>Historical trading volume — KOSDAQ</p>
    </div>
    <div class="updated">
      LAST UPDATED
      <span id="updated-time">—</span>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <div class="range-pills">
      <button data-period="1d">1D</button>
      <button data-period="5d">5D</button>
      <button data-period="1m" class="active">1M</button>
      <button data-period="1y">1Y</button>
      <button data-period="5y">5Y</button>
      <button data-period="all">All</button>
    </div>
    <div class="legend" id="legend"></div>
  </div>

  <!-- Chart -->
  <div class="chart-card">
    <div class="loading-overlay" id="loading"><div class="spinner"></div></div>
    <div class="chart-wrap">
      <canvas id="volumeChart"></canvas>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-grid" id="stats-grid"></div>

</div>

<script>
  // ── Config ──────────────────────────────────────────────────────────────────
  const STOCKS = {
    parataxis_eth: { label: "Parataxis Ethereum", color: "#4ade80", ticker: "290560" },
    bitmax:        { label: "Bitmax",              color: "#60a5fa", ticker: "241590" },
    bitplanet:     { label: "Bitplanet",           color: "#f59e0b", ticker: "034230" },
  };

  const keys    = Object.keys(STOCKS);
  const hidden  = new Set();   // toggled-off stocks
  let currentPeriod = "1m";
  let chart = null;
  let lastData = null;

  // ── Chart init ──────────────────────────────────────────────────────────────
  const ctx = document.getElementById("volumeChart").getContext("2d");
  chart = new Chart(ctx, {
    type: "bar",
    data: { labels: [], datasets: [] },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: "index", intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: "#1a1d22",
          borderColor: "#2a2d32",
          borderWidth: 1,
          titleFont: { family: "'DM Mono', monospace", size: 11 },
          bodyFont:  { family: "'DM Mono', monospace", size: 11 },
          callbacks: {
            label: ctx => ` ${ctx.dataset.label}: ${fmtVol(ctx.parsed.y)}`
          }
        }
      },
      scales: {
        x: {
          grid:   { color: "#1a1d22" },
          ticks:  { color: "#6b7280", font: { family: "'DM Mono', monospace", size: 10 }, maxTicksLimit: 10 },
          border: { color: "#1e2328" }
        },
        y: {
          grid:   { color: "#1a1d22" },
          ticks:  { color: "#6b7280", font: { family: "'DM Mono', monospace", size: 10 }, callback: v => fmtVol(v) },
          border: { color: "#1e2328" }
        }
      }
    }
  });

  // ── Helpers ─────────────────────────────────────────────────────────────────
  function fmtVol(v) {
    if (v == null) return "—";
    if (v >= 1_000_000) return (v / 1_000_000).toFixed(1) + "M";
    if (v >= 1_000)     return (v / 1_000).toFixed(0) + "K";
    return v.toString();
  }

  function fmtVolFull(v) {
    if (v == null) return "—";
    return v.toLocaleString();
  }

  // ── Legend ──────────────────────────────────────────────────────────────────
  function buildLegend(data) {
    const el = document.getElementById("legend");
    el.innerHTML = "";
    keys.forEach(key => {
      const s   = STOCKS[key];
      const src = data?.[key]?.source || "";
      const div = document.createElement("div");
      div.className = "legend-item" + (hidden.has(key) ? " dimmed" : "");
      div.innerHTML = `
        <div class="legend-dot" style="background:${s.color}"></div>
        <span class="legend-label">${s.label}</span>
        <span class="legend-source">${src ? "[" + src + "]" : ""}</span>
      `;
      div.addEventListener("click", () => toggleStock(key));
      el.appendChild(div);
    });
  }

  function toggleStock(key) {
    if (hidden.has(key)) hidden.delete(key); else hidden.add(key);
    if (lastData) renderChart(lastData);
    document.querySelectorAll(".legend-item").forEach((el, i) => {
      el.classList.toggle("dimmed", hidden.has(keys[i]));
    });
  }

  // ── Chart render ────────────────────────────────────────────────────────────
  function renderChart(data) {
    // Collect all unique dates across stocks
    const dateSet = new Set();
    keys.forEach(k => (data[k]?.dates || []).forEach(d => dateSet.add(d)));
    const labels = Array.from(dateSet).sort();

    const datasets = keys.map(key => {
      const s      = STOCKS[key];
      const stock  = data[key] || {};
      const dateMap = {};
      (stock.dates || []).forEach((d, i) => { dateMap[d] = stock.volumes[i]; });
      return {
        label:           s.label,
        data:            labels.map(d => dateMap[d] ?? null),
        backgroundColor: hidden.has(key) ? "transparent" : s.color + "99",
        borderColor:     hidden.has(key) ? "transparent" : s.color,
        borderWidth:     1,
        borderRadius:    2,
      };
    });

    chart.data.labels   = labels;
    chart.data.datasets = datasets;
    chart.update("none");
  }

  // ── Stats ───────────────────────────────────────────────────────────────────
  function renderStats(data) {
    const grid = document.getElementById("stats-grid");
    grid.innerHTML = "";
    keys.forEach(key => {
      const s      = STOCKS[key];
      const stock  = data[key] || {};
      const vols   = (stock.volumes || []).filter(v => v != null && v > 0);
      const latest = vols.length ? vols[vols.length - 1] : null;
      const avg    = vols.length ? Math.round(vols.reduce((a, b) => a + b, 0) / vols.length) : null;
      const high   = vols.length ? Math.max(...vols) : null;
      const low    = vols.length ? Math.min(...vols) : null;

      const card = document.createElement("div");
      card.className = "stat-card";
      card.innerHTML = `
        <div class="stat-card-header">
          <div class="stat-card-dot" style="background:${s.color}"></div>
          <span class="stat-card-name">${s.label}</span>
        </div>
        ${stock.error ? `<div class="error-msg">No data available</div>` : `
        <div class="stat-row">
          <span class="stat-label">Latest</span>
          <span class="stat-value">${fmtVolFull(latest)}</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Average</span>
          <span class="stat-value">${fmtVolFull(avg)}</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Highest</span>
          <span class="stat-value">${fmtVolFull(high)}</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Lowest</span>
          <span class="stat-value">${fmtVolFull(low)}</span>
        </div>
        `}
      `;
      grid.appendChild(card);
    });
  }

  // ── Fetch ───────────────────────────────────────────────────────────────────
  async function fetchData(period) {
    const loading = document.getElementById("loading");
    loading.classList.add("visible");
    try {
      const r    = await fetch(`/api/volume?period=${period}`);
      const json = await r.json();
      lastData   = json.data;
      document.getElementById("updated-time").textContent = json.updated_at;
      buildLegend(lastData);
      renderChart(lastData);
      renderStats(lastData);
    } catch (e) {
      console.error("Fetch error:", e);
    } finally {
      loading.classList.remove("visible");
    }
  }

  // ── Period buttons ───────────────────────────────────────────────────────────
  document.querySelectorAll(".range-pills button").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".range-pills button").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      currentPeriod = btn.dataset.period;
      fetchData(currentPeriod);
    });
  });

  // ── Init ─────────────────────────────────────────────────────────────────────
  fetchData(currentPeriod);
</script>
</body>
</html>
